name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install websockets pyinstaller

      - name: Build exe
        run: pyinstaller discord_voice_state.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord_voice_state
          path: dist/discord_voice_state.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/discord_voice_state.exe
